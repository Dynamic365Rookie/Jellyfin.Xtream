name: Publish Plugin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"

  release:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' Jellyfin.Xtream/Jellyfin.Xtream.csproj || true)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Xtream/Jellyfin.Xtream.csproj || true)
          fi
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not find version"
            exit 1
          fi
          echo "Found version: $VERSION"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="v${VERSION}-build.${TIMESTAMP}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: Automatic release
          draft: false
          prerelease: false

  upload:
    runs-on: ubuntu-latest
    needs:
      - build
      - release
    permissions:
      contents: write
    outputs:
      zip_name: ${{ steps.prepare.outputs.zip_name }}
      md5: ${{ steps.prepare.outputs.md5 }}
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: List downloaded files
        run: ls -la

      - name: Prepare and upload assets
        id: prepare
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -1)
          echo "Found ZIP: $ZIP_FILE"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP found, creating one from DLL"
            DLL_FILE=$(ls *.dll 2>/dev/null | head -1)
            echo "Found DLL: $DLL_FILE"
            ZIP_FILE="jellyfin-xtream_${{ needs.release.outputs.version }}.zip"
            zip "$ZIP_FILE" "$DLL_FILE"
          fi

          echo "Final ZIP file: $ZIP_FILE"
          MD5=$(md5sum "$ZIP_FILE" | awk '{print $1}')
          echo "MD5: $MD5"
          echo "zip_name=${ZIP_FILE}" >> $GITHUB_OUTPUT
          echo "md5=${MD5}" >> $GITHUB_OUTPUT
          md5sum "$ZIP_FILE" > "${ZIP_FILE%.zip}.md5"
          sha256sum "$ZIP_FILE" > "${ZIP_FILE%.zip}.sha256"
          ls -la

      - name: Upload assets to Release
        uses: shogo82148/actions-upload-release-asset@v1.9.2
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./*

  generate:
    runs-on: ubuntu-latest
    needs:
      - release
      - upload
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: master
          path: source

      - name: Generate repository.json
        env:
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          UPLOAD_MD5: ${{ needs.upload.outputs.md5 }}
          UPLOAD_ZIP: ${{ needs.upload.outputs.zip_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          GUID=$(grep -oP '(?<=Guid\.Parse\(")[^"]+' source/Jellyfin.Xtream/Plugin.cs || echo "5d774c35-8567-46d3-a950-9bb8227a0c5d")
          SOURCE_URL="https://github.com/${GH_REPO}/releases/download/${RELEASE_TAG}/${UPLOAD_ZIP}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ABI=$(grep -oP '(?<=<JellyfinVersion>)[^<]+' source/Jellyfin.Xtream/Jellyfin.Xtream.csproj || echo "10.11.0.0")

          echo "GUID       : $GUID"
          echo "VERSION    : $RELEASE_VERSION"
          echo "TAG        : $RELEASE_TAG"
          echo "MD5        : $UPLOAD_MD5"
          echo "ZIP        : $UPLOAD_ZIP"
          echo "SOURCE_URL : $SOURCE_URL"
          echo "ABI        : $ABI"

          python3 -c "
          import json
          import os

          data = [
            {
              'guid': os.environ['GUID'],
              'name': 'Jellyfin Xtream',
              'description': 'Plugin Xtream Codes - Fork avec support Dispatcharr',
              'overview': 'Plugin Xtream Codes - Fork avec support Dispatcharr',
              'owner': 'Dynamic365Rookie',
              'category': 'Live TV',
              'imageUrl': '',
              'versions': [
                {
                  'checksum': os.environ['UPLOAD_MD5'],
                  'changelog': 'Automatic release from commit ' + os.environ['COMMIT_SHA'],
                  'targetAbi': os.environ['ABI'],
                  'sourceUrl': os.environ['SOURCE_URL'],
                  'version': os.environ['RELEASE_VERSION'],
                  'timestamp': os.environ['TIMESTAMP']
                }
              ]
            }
          ]

          with open('repository.json', 'w') as f:
            json.dump(data, f, indent=2)

          print(json.dumps(data, indent=2))
          " GUID=$GUID SOURCE_URL=$SOURCE_URL ABI=$ABI TIMESTAMP=$TIMESTAMP

      - name: Commit and push repository.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repository.json
          git diff --staged --quiet || git commit -m "Update repository.json for ${{ needs.release.outputs.tag }}"
          git push origin gh-pages