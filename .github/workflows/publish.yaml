name: "🚀 Publish Plugin"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"

  release:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' Jellyfin.Xtream/Jellyfin.Xtream.csproj || true)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Xtream/Jellyfin.Xtream.csproj || true)
          fi
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not find version"
            exit 1
          fi
          echo "Found version: $VERSION"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="v${VERSION}-build.${TIMESTAMP}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body: "Automatic release from commit ${{ github.sha }}"
          draft: false
          prerelease: false

  upload:
    runs-on: ubuntu-latest
    needs:
      - build
      - release
    permissions:
      contents: write
    outputs:
      zip_name: ${{ steps.prepare.outputs.zip_name }}
      md5: ${{ steps.prepare.outputs.md5 }}
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: List downloaded files
        run: ls -la

      - name: Prepare and upload assets
        id: prepare
        run: |
          # Trouver le ZIP généré par le build
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -1)
          echo "Found ZIP: $ZIP_FILE"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP found, creating one from DLL"
            DLL_FILE=$(ls *.dll 2>/dev/null | head -1)
            echo "Found DLL: $DLL_FILE"
            ZIP_FILE="jellyfin-xtream_${{ needs.release.outputs.version }}.zip"
            zip "$ZIP_FILE" "$DLL_FILE"
          fi

          echo "Final ZIP file: $ZIP_FILE"

          # Calculer le MD5
          MD5=$(md5sum "$ZIP_FILE" | awk '{print $1}')
          echo "MD5: $MD5"

          echo "zip_name=${ZIP_FILE}" >> $GITHUB_OUTPUT
          echo "md5=${MD5}" >> $GITHUB_OUTPUT

          # Créer les fichiers de checksum
          md5sum "$ZIP_FILE" > "${ZIP_FILE%.zip}.md5"
          sha256sum "$ZIP_FILE" > "${ZIP_FILE%.zip}.sha256"
          ls -la

      - name: Upload assets to Release
        uses: shogo82148/actions-upload-release-asset@v1.9.2
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./*

  generate:
    runs-on: ubuntu-latest
    needs:
      - release
      - upload
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Checkout source to get Plugin.cs and csproj
        uses: actions/checkout@v4
        with:
          ref: master
          path: source

      - name: Generate repository.json
        run: |
          GUID=$(grep -oP '(?<=Guid\.Parse\(")[^"]+' source/Jellyfin.Xtream/Plugin.cs || echo "5d774c35-8567-46d3-a950-9bb8227a0c5d")
          VERSION="${{ needs.release.outputs.version }}"
          TAG="${{ needs.release.outputs.tag }}"
          MD5="${{ needs.upload.outputs.md5 }}"
          ZIP_NAME="${{ needs.upload.outputs.zip_name }}"
          REPO="${{ github.repository }}"
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/${ZIP_NAME}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ABI=$(grep -oP '(?<=<JellyfinVersion>)[^<]+' source/Jellyfin.Xtream/Jellyfin.Xtream.csproj || echo "10.11.0.0")

          echo "=== repository.json values ==="
          echo "GUID      : $GUID"
          echo "VERSION   : $VERSION"
          echo "TAG       : $TAG"
          echo "MD5       : $MD5"
          echo "ZIP_NAME  : $ZIP_NAME"
          echo "SOURCE_URL: $SOURCE_URL"
          echo "ABI       : $ABI"

          cat > repository.json << EOF
          [
            {
              "checksum": "${MD5}",
              "changelog": "Automatic release from commit ${{ github.sha }}",
              "guid": "${GUID}",
              "name": "Jellyfin Xtream",
              "overview": "Plugin Xtream Codes - Fork avec support Dispatcharr",
              "owner": "Dynamic365Rookie",
              "category": "Live TV",
              "version": "${VERSION}",
              "targetAbi": "${ABI}",
              "sourceUrl": "${SOURCE_URL}",
              "timestamp": "${TIMESTAMP}"
            }
          ]
          EOF

          # Supprimer l'indentation du heredoc
          sed -i 's/^          //' repository.json
          cat repository.json

      - name: Commit and push repository.json to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repository.json
          git diff --staged --quiet || git commit -m "Update repository.json for ${{ needs.release.outputs.tag }}"
          git push origin gh-pages