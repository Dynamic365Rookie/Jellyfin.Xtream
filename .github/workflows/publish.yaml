name: "🚀 Publish Plugin"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"

  release:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from csproj
        id: version
        run: |
          # Le projet utilise <AssemblyVersion> au lieu de <Version>
          VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' Jellyfin.Xtream/Jellyfin.Xtream.csproj || true)
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Xtream/Jellyfin.Xtream.csproj || true)
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Jellyfin.Xtream/Jellyfin.Xtream.csproj || true)
          fi
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not find version in .csproj"
            cat Jellyfin.Xtream/Jellyfin.Xtream.csproj
            exit 1
          fi
          echo "Found version: $VERSION"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="v${VERSION}-build.${TIMESTAMP}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body: "Automatic release from commit ${{ github.sha }}"
          draft: false
          prerelease: false

  upload:
    runs-on: ubuntu-latest
    needs:
      - build
      - release
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Prepare GitHub Release assets
        run: |-
          for file in ./*; do
            md5sum ${file#./} >> ${file%.*}.md5
            sha256sum ${file#./} >> ${file%.*}.sha256
          done
          ls -l

      - name: Upload GitHub Release assets
        uses: shogo82148/actions-upload-release-asset@v1.9.2
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./*

  generate:
    runs-on: ubuntu-latest
    needs:
      - upload
    steps:
      - name: Jellyfin plugin repo
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}